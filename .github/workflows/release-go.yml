name: Release Go binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [arm64, amd64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server-go/go.mod

      - name: Install pnpm dependencies
        run: npm install -g pnpm && pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd server-go
          go build \
            -tags embed \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../dist/workbench-cli-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/workbench-cli

      - name: Create tarball
        run: |
          cd dist
          tar czf workbench-cli-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            workbench-cli-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/workbench-cli-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
